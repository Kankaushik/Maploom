<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"
    />
    <title>Map Viewer</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"
    />
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        margin: 0;
        font-family: "Segoe UI", Tahoma, sans-serif;
        overflow: hidden;
        background: #f9fafb;
      }
      #map {
        position: absolute;
        inset: 0;
        z-index: 0;
      }
      #top {
        position: fixed;
        top: 12px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 10px;
        align-items: center;
        background: #fffefc;
        padding: 6px 12px;
        border-radius: 10px;
        max-width: 95vw;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        z-index: 1100;
        overflow-x: auto;
      }
      #top::-webkit-scrollbar {
        height: 6px;
      }
      #top::-webkit-scrollbar-thumb {
        background: #1e7fd4;
        border-radius: 3px;
      }
      #brandLogo img {
        height: 36px;
        cursor: pointer;
        width: auto;
        display: block;
        border-radius: 6px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
    
    
      }

      
      #top > * {
        font-size: 14px;
        border: 1px solid #bbb;
        border-radius: 6px;
        background: #fff;
        padding: 6px 12px;
        cursor: pointer;
        white-space: nowrap;
        transition: background 0.25s, color 0.25s;
      }
      #top > *:hover:not(:disabled) {
        background: #1e7fd4;
        color: #fff;
        border-color: #1e7fd4;
      }
      #drawBtn.active {
        background: #fd7e14 !important;
        color: #fff !important;
        border-color: #fd7e14 !important;
      }
      .leaflet-container.draw-mode {
        cursor: crosshair !important;
      }
      #mapSpinner {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(255, 255, 255, 0.8);
        padding: 12px 20px;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        display: none;
        z-index: 1200;
        font-weight: 600;
        color: #0369a1;
      }
      .dialog {
        position: absolute;
        width: min(440px, calc(100vw - 24px));
        max-height: 80vh;
        border-radius: 16px;
        box-shadow: 0 15px 40px rgba(14, 165, 233, 0.3);
        background: #fff;
        overflow: hidden;
        display: none;
        opacity: 0;
        transition: opacity 0.25s;
        z-index: 2000;
      }
      .dialog.open {
        display: block;
        opacity: 1;
      }
      .dialog header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 16px;
        background: #e0f2fe;
        border-top-left-radius: 16px;
        border-top-right-radius: 16px;
        cursor: grab;
      }
      .dialog header h3 {
        margin: 0;
        font-size: 1.1rem;
        font-weight: 700;
        color: #0369a1;
      }
      .dialog .closeBtn {
        border: none;
        background: none;
        font: 24px/1 "Segoe UI";
        color: #0284c7;
        cursor: pointer;
        padding: 0 4px;
      }
      #customPopup {
        background: linear-gradient(135deg, #fff 0%, #e0f2fe 100%);
      }
      #customPopup .body {
        padding: 12px 16px 24px;
        overflow-y: auto;
        max-height: calc(80vh - 60px);
      }
      #customPopup h2 {
        margin: 8px 0;
        font-size: 1.4rem;
        font-weight: 700;
        color: #0c4a6e;
      }
      #customPopup .sub {
        font-style: italic;
        margin-bottom: 12px;
        color: #475569;
      }
      #customPopup ul {
        margin: 8px 0 16px;
        padding-left: 22px;
        list-style: disc;
        font-size: 0.9rem;
        color: #1e293b;
      }
      #customPopup .docs a {
        display: inline-block;
        margin: 6px 8px 6px 0;
        padding: 6px 12px;
        font-size: 13px;
        background: #bae6fd;
        border-radius: 12px;
        text-decoration: none;
        color: #0c4a6e;
        font-weight: 600;
        box-shadow: 0 3px 10px rgba(14, 165, 233, 0.3);
      }
      #noteModal header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 16px;
        background: #e0f2fe;
        border-top-left-radius: 16px;
        border-top-right-radius: 16px;
        cursor: grab;
      }
      #noteModal header h3 {
        margin: 0;
        font-size: 1.5rem;
        font-weight: 700;
        color: #0369a1;
      }
      #noteModal .closeBtn {
        border: none;
        background: none;
        font: 24px/1 "Segoe UI";
        color: #0284c7;
        cursor: pointer;
        padding: 0 4px;
      }
      #noteModal .body {
        padding: 16px 24px;
        overflow-y: auto;
        max-height: calc(80vh - 140px);
      }
      #noteModal label {
        margin: 14px 0 6px;
        font-weight: 600;
        color: #0c4a6e;
      }
      #noteModal input,
      #noteModal textarea {
        width: 100%;
        padding: 10px;
        font-size: 15px;
        border: 1.5px solid #0284c7;
        border-radius: 10px;
      }
      #noteModal footer.btns {
        display: flex;
        justify-content: flex-end;
        gap: 14px;
        padding: 12px 24px;
        background: #f9fafb;
        border-bottom-left-radius: 16px;
        border-bottom-right-radius: 16px;
      }
      #noteSend,
      #noteCancel {
        border: none;
        border-radius: 10px;
        padding: 12px 20px;
        font-weight: 700;
        cursor: pointer;
      }
      #noteSend {
        background: #0284c7;
        color: #fff;
      }
      #noteCancel {
        background: #cbd5e1;
        color: #334155;
      }
      .leaflet-control-zoom {
        top: 102px !important;
        z-index: 1200;
      }
      #toastContainer {
        position: fixed;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        max-width: 320px;
        z-index: 1500;
      }
      .toast {
        background: #28a745;
        color: #fff;
        padding: 14px 24px;
        margin-top: 10px;
        border-radius: 12px;
        font-size: 14px;
        font-weight: 600;
      }
    </style>
  </head>

  <body>
    <div id="top">
      <div id="brandLogo">
        <img src="Maploom_logo.png" alt="Logo" />
      </div>
      <strong>Choose Map:</strong>
      <select id="mapList">
        <option>Loading…</option>
      </select>
      <button id="drawBtn">✎ Draw</button>
      <button id="clearBtn">❌ Clear</button>
      <button id="noteBtn">📝 Note</button>
      <label
        ><input type="checkbox" id="saveSketchToggle" /> Save sketch with
        note</label
      >
    </div>

    <div id="mapSpinner">Loading map…</div>
    <div id="map"></div>

    <div id="customPopup" class="dialog">
      <header>
        <h3>Area <span id="pCode"></span></h3>
        <button class="closeBtn">×</button>
      </header>
      <div class="body">
        <h2 id="pTitle"></h2>
        <div class="sub" id="pSub"></div>
        <div id="pDesc"></div>
        <ul id="pFeat"></ul>
        <div class="docs" id="pDocs"></div>
      </div>
    </div>

    <div id="noteModal" class="dialog">
      <header id="noteHdr">
        <h3>Send Note to Admin</h3>
        <button class="closeBtn" id="notePopClose">×</button>
      </header>
      <form id="noteForm">
        <div class="body">
          <label>Area Code*<input id="noteCode" required /></label>
          <label>Description<textarea id="noteDesc" rows="3"></textarea></label>
          <label
            >Key Changes (one per line)<textarea
              id="noteChanges"
              rows="3"
            ></textarea
          ></label>
        </div>
        <footer class="btns">
          <button type="button" id="noteCancel">Cancel</button>
          <button id="noteSend">Send</button>
        </footer>
      </form>
    </div>

    <div id="toastContainer" aria-live="assertive"></div>

    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
      const $ = (q) => document.querySelector(q);

      // --------- API auto-detect: same-origin, :5000, then :3000 ---------
      async function detectApiBase() {
        const proto = location.protocol;
        const host = location.hostname;
        const candidates = [
          "", // same-origin
          `${proto}//${host}:5000`,
          `${proto}//${host}:3000`,
        ];
        for (const base of candidates) {
          try {
            const r = await fetch(`${base}/api/maps/list`, {
              credentials: "include",
            });
            if (r.ok) return base;
          } catch {}
        }
        return ""; // fall back to same-origin
      }

      // toast helper
      const toast = (msg, t = 3000) => {
        const n = document.createElement("div");
        n.className = "toast";
        n.textContent = msg;
        document.getElementById("toastContainer").appendChild(n);
        setTimeout(() => {
          n.style.opacity = 0;
          setTimeout(() => n.remove(), 500);
        }, t);
      };

      // Leaflet
      const map = L.map("map", {
        crs: L.CRS.Simple,
        minZoom: -5,
        maxZoom: 5,
        zoomSnap: 0.25,
        zoomDelta: 0.25,
        preferCanvas: true,
        inertia: true,
        zoomAnimation: true,
      });
      map.zoomControl.setPosition("topright");

      map.createPane("sketchPane");
      map.getPane("sketchPane").style.zIndex = 450;
      map.getPane("sketchPane").style.pointerEvents = "none";

      const features = L.featureGroup().addTo(map);
      const sketches = L.featureGroup({ pane: "sketchPane" }).addTo(map);

      const ui = {
        list: $("#mapList"),
        draw: $("#drawBtn"),
        clear: $("#clearBtn"),
        noteBtn: $("#noteBtn"),
        save: $("#saveSketchToggle"),
        pop: $("#customPopup"),
        popClose: $("#customPopup .closeBtn"),
        p: {
          code: $("#pCode"),
          title: $("#pTitle"),
          sub: $("#pSub"),
          desc: $("#pDesc"),
          feat: $("#pFeat"),
          docs: $("#pDocs"),
        },
        modal: $("#noteModal"),
        form: $("#noteForm"),
        code: $("#noteCode"),
        desc: $("#noteDesc"),
        chg: $("#noteChanges"),
        spinner: $("#mapSpinner"),
        top: $("#top"),
        brandLogo: $("#brandLogo"),
      };

      let API_BASE = "";
      let current = "";
      let overlay = null;
      let meta = {};
      let drawMode = false;
      let drawing = false;
      let polyline = null;
      let activeLayer = null;

      (async function init() {
        API_BASE = await detectApiBase();
        await loadMapList();
      })();

      async function loadMapList() {
        try {
          const resp = await fetch(`${API_BASE}/api/maps/list`, {
            credentials: "include",
          });
          const arr = resp.ok ? await resp.json() : [];
          ui.list.innerHTML = arr.length
            ? '<option value="">Select a map…</option>'
            : '<option value="">(no maps found)</option>';
          arr.forEach((n) => {
            const o = document.createElement("option");
            o.value = o.textContent = n;
            ui.list.appendChild(o);
          });
        } catch (e) {
          console.error(e);
          ui.list.innerHTML = '<option value="">(no maps found)</option>';
          toast("Could not load maps. Make sure the API is running.");
        }
      }

      const imgOverlay = (src, w, h) =>
        new Promise((res) => {
          const i = new Image();
          i.onload = () => res(L.imageOverlay(src, [[0, 0], [h, w]]));
          i.src = src;
        });

      ui.list.onchange = async () => {
        current = ui.list.value;
        if (!current) return;
        ui.spinner.style.display = "block";
        try {
          const resp = await fetch(
            `${API_BASE}/api/maps/${encodeURIComponent(current)}`,
            { credentials: "include" }
          );
          if (!resp.ok) throw new Error("Failed to load map");
          const d = await resp.json();

          // support both shapes: {imgSrc,imgW,imgH} and {src,w,h}
          const img = d.imgData || {};
          const imgSrc = img.imgSrc || img.src;
          const imgW = img.imgW ?? img.w;
          const imgH = img.imgH ?? img.h;
          if (!imgSrc || !imgW || !imgH) {
            throw new Error("Invalid image data");
          }

          meta = d.areaData || {};
          features.clearLayers();
          sketches.clearLayers();
          if (overlay) map.removeLayer(overlay);

          overlay = await imgOverlay(imgSrc, imgW, imgH);
          overlay.addTo(map);
          map.setMaxBounds([
            [0, 0],
            [imgH, imgW],
          ]);
          map.fitBounds([
            [0, 0],
            [imgH, imgW],
          ]);

          const gj = d.geojson
            ? typeof d.geojson === "string"
              ? JSON.parse(d.geojson)
              : d.geojson
            : null;

          if (gj) {
            L.geoJSON(gj, {
              renderer: L.canvas({ padding: 0.5, tolerance: 1 }),
              style: (f) => ({
                color: meta[f.properties.id]?.border || "#f00",
                weight: 2,
                fillColor: meta[f.properties.id]?.bg || "#fff",
                fillOpacity: 0.23,
              }),
              onEachFeature: (f, l) => {
                attachFeatureHandlers(l);
                features.addLayer(l);
              },
            });
          }
        } catch (e) {
          console.error(e);
          toast("Failed to load map data.");
        } finally {
          ui.spinner.style.display = "none";
        }
      };

      function attachFeatureHandlers(layer) {
        const id = layer.feature.properties.id;
        const m = meta[id] || {};
        layer.off("mouseover mouseout click").on({
          mouseover: () => layer.setStyle({ fillColor: m.hover || "#ffe6e6" }),
          mouseout: () => layer.setStyle({ fillColor: m.bg || "#fff" }),
          click: (e) => openInfo(e, m),
        });
      }

      function clampAndFlipPopup(el, x, y) {
        const margin = 12;
        const bottom = 20;
        const topBar = ui.top.getBoundingClientRect().bottom + margin;

        el.dataset._lastX = x;
        el.dataset._lastY = y;

        el.style.display = "block";
        el.style.opacity = "1";
        el.style.transform = "none";

        const r = el.getBoundingClientRect();
        const vw = innerWidth;
        const vh = innerHeight;

        let left =
          x + r.width + margin <= vw
            ? x
            : x - r.width - margin >= 0
            ? x - r.width
            : Math.max(margin, vw - margin - r.width);

        let top =
          y + r.height + bottom <= vh
            ? y
            : y - r.height - margin >= topBar
            ? y - r.height
            : topBar;

        el.style.left = left + "px";
        el.style.top = top + "px";
      }

      function openInfo(evt, m) {
        if (activeLayer) {
          const pid = activeLayer.feature.properties.id;
          const pm = meta[pid] || {};
          activeLayer.setStyle({
            color: pm.border || "#f00",
            weight: 2,
            fillColor: pm.bg || "#fff",
            fillOpacity: 0.23,
          });
        }

        activeLayer = evt.target;
        activeLayer.setStyle({
          color: "#0284c7",
          weight: 3,
          fillColor: "#bde6fd",
          fillOpacity: 0.4,
        });

        $("#pCode").textContent = m.code || evt.target.feature.properties.id;
        $("#pTitle").textContent = m.title || "";
        $("#pSub").textContent = m.subtitle || "";
        $("#pDesc").textContent = m.desc || "";
        $("#pFeat").innerHTML = (m.features || [])
          .map((t) => `<li>${t}</li>`)
          .join("");
        $("#pDocs").innerHTML = m.docs?.length
          ? `<strong>Documents:</strong><br>${m.docs
              .map(
                (d) =>
                  `<a href="${d.url}" target="_blank" rel="noopener">${d.title}</a>`
              )
              .join("<br>")}`
          : "";

        const cp = map.latLngToContainerPoint(evt.latlng);
        const mr = map.getContainer().getBoundingClientRect();
        clampAndFlipPopup($("#customPopup"), mr.left + cp.x, mr.top + cp.y);
        $("#customPopup").classList.add("open");
      }

      function closeInfo() {
        const pop = $("#customPopup");
        pop.classList.remove("open");
        pop.style.display = "none";
        pop.style.opacity = "0";
        pop.style.left = "";
        pop.style.top = "";

        if (activeLayer) {
          const pid = activeLayer.feature.properties.id;
          const pm = meta[pid] || {};
          activeLayer.setStyle({
            color: pm.border || "#f00",
            weight: 2,
            fillColor: pm.bg || "#fff",
            fillOpacity: 0.23,
          });
          activeLayer = null;
        }
      }

      document.querySelector("#customPopup .closeBtn").onclick = (e) => {
        e.stopPropagation();
        closeInfo();
      };

      document.addEventListener("mousedown", (e) => {
        const p = $("#customPopup");
        if (p.classList.contains("open") && !p.contains(e.target)) {
          closeInfo();
        }
      });

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape" && $("#customPopup").classList.contains("open")) {
          closeInfo();
        }
      });

      map.on("moveend", () => {
        const p = $("#customPopup");
        if (p.classList.contains("open")) {
          clampAndFlipPopup(
            p,
            parseFloat(p.dataset._lastX),
            parseFloat(p.dataset._lastY)
          );
        }
      });

      window.addEventListener("resize", () => {
        const p = $("#customPopup");
        if (p.classList.contains("open")) {
          clampAndFlipPopup(
            p,
            parseFloat(p.dataset._lastX),
            parseFloat(p.dataset._lastY)
          );
        }
      });

      // Drawing
      const touchC = map.getContainer();
      let ts, tm, te;

      function setDrawMode(on) {
        drawMode = on;
        $("#drawBtn").classList.toggle("active", on);
        map.getContainer().classList.toggle("draw-mode", on);

        map.dragging[on ? "disable" : "enable"]();
        map.touchZoom[on ? "disable" : "enable"]();
        map.doubleClickZoom[on ? "disable" : "enable"]();

        if (on) {
          map
            .on("mousedown", startDraw)
            .on("mousemove", moveDraw)
            .on("mouseup", endDraw)
            .on("mouseleave", endDraw);

          ts = (e) => startDraw({ originalEvent: e });
          tm = (e) => moveDraw({ originalEvent: e });
          te = () => endDraw();

          touchC.addEventListener("touchstart", ts, { passive: false });
          touchC.addEventListener("touchmove", tm, { passive: false });
          touchC.addEventListener("touchend", te);
          touchC.addEventListener("touchcancel", te);
        } else {
          map
            .off("mousedown", startDraw)
            .off("mousemove", moveDraw)
            .off("mouseup", endDraw)
            .off("mouseleave", endDraw);

          touchC.removeEventListener("touchstart", ts);
          touchC.removeEventListener("touchmove", tm);
          touchC.removeEventListener("touchend", te);
          touchC.removeEventListener("touchcancel", te);
        }
      }

      function toLatLngFromEvent(e) {
        const ev = e.originalEvent || e;
        if (ev.touches && ev.touches.length) {
          return map.mouseEventToLatLng(ev.touches[0]);
        }
        return map.mouseEventToLatLng(ev);
      }

      function startDraw(e) {
        if (!drawMode) return;
        const ll = toLatLngFromEvent(e);
        drawing = true;
        polyline = L.polyline([ll], {
          color: "#fd7e14",
          weight: 3,
          pane: "sketchPane",
          interactive: false,
        }).addTo(map);
        sketches.addLayer(polyline);
      }

      function moveDraw(e) {
        if (!drawing || !polyline) return;
        const ll = toLatLngFromEvent(e);
        const last = polyline.getLatLngs().slice(-1)[0];
        if (last && last.distanceTo(ll) < 0.25) return;
        polyline.addLatLng(ll);
        if (e.originalEvent && e.originalEvent.touches && e.originalEvent.cancelable) {
          e.originalEvent.preventDefault();
        }
      }

      function endDraw() {
        drawing = false;
        polyline = null;
      }

      $("#drawBtn").onclick = () => setDrawMode(!drawMode);
      $("#clearBtn").onclick = () => {
        sketches.clearLayers();
        setDrawMode(false);
      };

      // Note modal (simple)
      const noteModal = $("#noteModal");
      const noteClose = $("#notePopClose");
      const noteCancel = $("#noteCancel");

      function openNote() {
        if (!current) return alert("Select a map first");
        $("#noteCode").value = "";
        $("#noteDesc").value = "";
        $("#noteChanges").value = "";
        noteModal.classList.add("open");
        noteModal.style.display = "block";
        noteModal.style.opacity = "1";
        noteModal.style.left = "50%";
        noteModal.style.top = "50%";
        noteModal.style.transform = "translate(-50%,-50%)";
      }

      function closeNote() {
        noteModal.classList.remove("open");
        noteModal.style.display = "none";
        noteModal.style.opacity = "0";
        noteModal.style.left = "";
        noteModal.style.top = "";
      }

      $("#noteBtn").onclick = openNote;
      noteClose.onclick = (e) => {
        e.stopPropagation();
        closeNote();
      };
      noteCancel.onclick = (e) => {
        e.preventDefault();
        closeNote();
      };

      $("#noteForm").onsubmit = async (ev) => {
        ev.preventDefault();

        const code = $("#noteCode").value.trim();
        if (!code) return alert("Area Code required");

        const desc = $("#noteDesc").value.trim();
        const changes = $("#noteChanges")
          .value.split("\n")
          .map((v) => v.trim())
          .filter(Boolean);

        const note =
          `Area Code: ${code}\n` +
          `Description: ${desc || "-"}\n` +
          `Key Changes:\n${changes.length ? changes.map((t) => " - " + t).join("\n") : "(none)"}`;

        const payload = { mapName: current, note };

        if ($("#saveSketchToggle").checked && sketches.getLayers().length) {
          payload.geojson = {
            type: "FeatureCollection",
            features: sketches.getLayers().map((l) => l.toGeoJSON()),
          };
        }

        try {
          const r = await fetch(`${API_BASE}/api/feedback`, {
            method: "POST",
            credentials: "include",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          if (!r.ok) throw new Error("Failed");
          toast("✅ Note sent!");
        } catch {
          alert("Failed – try again later.");
        }

        closeNote();
        sketches.clearLayers();
      };

      $("#brandLogo").addEventListener("click", () => location.reload());
    </script>
  </body>
</html>
